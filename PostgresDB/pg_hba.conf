# TYPE   DATABASE      USER                       ADDRESS         METHOD

# Superuser local (unix-socket) access
local    all           postgres                                   trust

# Allow superuser connections from Docker network (for DBeaver etc.)
host     all           postgres        172.28.0.0/16          scram-sha-256

# Application service roles — password auth, scoped to the compose `backend`
# network subnet only (see docker-compose.yaml networks.backend.ipam). This
# replaces the previous 0.0.0.0/0 rules that accepted auth from anywhere.
host     fastapi_ms    user_service_role          172.28.0.0/16   scram-sha-256
host     fastapi_ms    subscription_service_role  172.28.0.0/16   scram-sha-256
host     fastapi_ms    db_service_role            172.28.0.0/16   scram-sha-256

# Debezium — needs a replication connection + a regular one for schema discovery
host     fastapi_ms    debezium_role              172.28.0.0/16   scram-sha-256
host     replication   debezium_role              172.28.0.0/16   scram-sha-256

# Loopback for local dev tools reaching the published 127.0.0.1:5432 mapping.
host     all           all                        127.0.0.1/32    scram-sha-256
host     all           all                        ::1/128         scram-sha-256
