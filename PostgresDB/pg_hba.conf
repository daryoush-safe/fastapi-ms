# TYPE   DATABASE      USER                    ADDRESS         METHOD

# Superuser local access
local    all           postgres                                trust

# Application service roles — password auth over TCP
host     fastapi_ms    user_service_role        0.0.0.0/0      scram-sha-256
host     fastapi_ms    subscription_service_role 0.0.0.0/0     scram-sha-256

# Debezium — needs replication connection + regular connection for schema discovery
host     fastapi_ms    debezium_role            0.0.0.0/0      scram-sha-256
host     replication   debezium_role            0.0.0.0/0      scram-sha-256

# Fallback for local dev tools (e.g. psql, DBeaver from host)
host     all           all                      127.0.0.1/32   scram-sha-256
host     all           all                      ::1/128        scram-sha-256