# ─── Connection ───────────────────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200

# ─── Logical replication (mandatory for Debezium pgoutput) ────────────────────
wal_level = logical
max_wal_senders = 10       # one per replication slot + headroom
max_replication_slots = 10 # one per Debezium connector + headroom
wal_keep_size = 1024       # MB — keep WAL segments around long enough for CDC

# ─── Performance ──────────────────────────────────────────────────────────────
shared_buffers = 256MB
work_mem = 16MB
maintenance_work_mem = 128MB
effective_cache_size = 1GB
checkpoint_completion_target = 0.9
random_page_cost = 1.1

# ─── Logging ──────────────────────────────────────────────────────────────────
log_timezone = 'UTC'
log_min_duration_statement = 500   # log slow queries > 500ms
log_connections = on
log_disconnections = on
log_replication_commands = on      # visibility into what Debezium is doing

# ─── Timezone ─────────────────────────────────────────────────────────────────
timezone = 'UTC'

# ─── Locale ───────────────────────────────────────────────────────────────────
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'