name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: UserService
            dockerfile: UserService/Dockerfile
            image: user-service
          - service: SubscriptionService
            dockerfile: SubscriptionService/Dockerfile
            image: subscription-service
          - service: DBService
            dockerfile: DBService/Dockerfile
            image: db-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=long
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            PIP_INDEX_URL=https://pypi.org/simple
            UV_INDEX_URL=https://pypi.org/simple
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  update-platform-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/master' }}
    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          repository: daryoush-safe/platform
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          path: platform

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tags
        run: |
          cd platform
          yq -i '.image.tag = "sha-${{ github.sha }}"' apps/values/userservice.yaml
          yq -i '.image.tag = "sha-${{ github.sha }}"' apps/values/subscriptionservice.yaml
          yq -i '.image.tag = "sha-${{ github.sha }}"' apps/values/dbservice.yaml

      - name: Commit and push
        run: |
          cd platform
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No tag changes"
          else
            git add apps/values/userservice.yaml apps/values/subscriptionservice.yaml apps/values/dbservice.yaml
            git commit -m "chore: bump image tags to sha-${{ github.sha }}"
            git push
          fi
