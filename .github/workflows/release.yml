name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: UserService
            dockerfile: UserService/Dockerfile
            image: user-service
          - service: SubscriptionService
            dockerfile: SubscriptionService/Dockerfile
            image: subscription-service
          - service: DBService
            dockerfile: DBService/Dockerfile
            image: db-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=long
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            PIP_INDEX_URL=https://pypi.org/simple
            UV_INDEX_URL=https://pypi.org/simple
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # Dormant until BOTH are true:
  #   1. Repo variable DEPLOY_ENABLED = true
  #      (Settings → Secrets and variables → Actions → Variables)
  #   2. The DEPLOY_* and app secrets below exist
  #      (Settings → Secrets and variables → Actions → Secrets)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/master' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Render production .env + deploy bundle
        run: |
          cat > .env <<EOF
          POSTGRES_SUPERUSER_PASSWORD=${{ secrets.POSTGRES_SUPERUSER_PASSWORD }}
          USER_SERVICE_DB_PASSWORD=${{ secrets.USER_SERVICE_DB_PASSWORD }}
          SUBSCRIPTION_SERVICE_DB_PASSWORD=${{ secrets.SUBSCRIPTION_SERVICE_DB_PASSWORD }}
          DEBEZIUM_DB_PASSWORD=${{ secrets.DEBEZIUM_DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_ALGORITHM=HS256
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
          IMAGE_OWNER=${{ github.repository_owner }}
          IMAGE_TAG=sha-${{ github.sha }}
          EOF
          # Files the host needs to bring the stack up.
          tar czf deploy.tgz \
            docker-compose.yaml docker-compose.prod.yaml \
            debezium PostgresDB scripts .env

      - name: Copy bundle + deploy over SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/id_deploy deploy.tgz \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/deploy.tgz"
          ssh -i ~/.ssh/id_deploy \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" bash -s <<'REMOTE'
            set -euo pipefail
            APP_DIR="$HOME/fastapi-ms"
            mkdir -p "$APP_DIR"
            tar xzf /tmp/deploy.tgz -C "$APP_DIR"
            cd "$APP_DIR"
            # If your GHCR images are PRIVATE, log in first (add a GHCR_PULL_TOKEN secret
            # with read:packages and uncomment — note: secret is interpolated by Actions):
            #   echo "GHCR_PULL_TOKEN_PLACEHOLDER" | docker login ghcr.io -u OWNER --password-stdin
            docker compose -f docker-compose.yaml -f docker-compose.prod.yaml pull
            docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d
            docker image prune -f
          REMOTE
