name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace (installs ruff + pytest from the dev group)
        run: uv sync --all-packages --python 3.14

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [UserService, SubscriptionService, DBService]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/${{ matrix.service }}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages --python 3.14

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: |
          set +e
          uv run pytest tests -q
          code=$?
          set -e
          # pytest exit code 5 = "no tests collected" — expected while suites are stubs.
          if [ "$code" -eq 5 ]; then
            echo "No tests collected yet for ${{ matrix.service }} — passing."
            exit 0
          fi
          exit "$code"

  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: UserService
            dockerfile: UserService/Dockerfile
            image: userservice
          - service: SubscriptionService
            dockerfile: SubscriptionService/Dockerfile
            image: subscriptionservice
          - service: DBService
            dockerfile: DBService/Dockerfile
            image: dbservice
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          build-args: |
            PIP_INDEX_URL=https://pypi.org/simple
            UV_INDEX_URL=https://pypi.org/simple
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          tags: ${{ matrix.image }}:ci
