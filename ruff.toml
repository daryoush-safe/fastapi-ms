target-version = "py313"
line-length = 100

extend-exclude = [
    ".venv",
    "migrations",
    "contracts/contracts.egg-info",
]

[lint]
# Conservative starter set: real errors (F), style (E/W), import order (I).
# Add "B" (bugbear) and "UP" (pyupgrade) once the codebase is clean.
select = ["E", "W", "F", "I"]
ignore = [
    "E501",  # line length is enforced by the formatter, not the linter
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]       # re-exports
"**/tests/**" = ["F401", "F811"]  # fixtures / overrides
